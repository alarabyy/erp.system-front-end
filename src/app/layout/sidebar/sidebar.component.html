<aside class="sidebar-wrapper">
  <!-- Header: Brand & Identity -->
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-box">Q</div>
      <div class="brand">كوانتم Business v3.0</div>
    </div>
  </div>

  <!-- Search Bar: Classic Design Restored -->
  <div class="sidebar-search">
    <input 
      type="text" 
      [(ngModel)]="searchQuery" 
      (input)="onSearch()" 
      placeholder="ابحث في قوائم السيستم...">
  </div>

  <!-- Navigation: Reorganized & Eye-Friendly -->
  <div class="sidebar-nav">
    <div *ngFor="let group of navItems" class="nav-group">
      <!-- Group Header with Separator Style -->
      <div 
        class="nav-group-header" 
        (click)="toggleItem(group)"
        [class.active]="group.expanded">
        <span class="group-label">{{ group.label }}</span>
        <span class="group-arrow">◀</span>
      </div>

      <!-- Sub-Items: Max 5-6 Items per Highly-Organized Group -->
      <div class="sub-nav-group" *ngIf="group.expanded">
        <div 
          *ngFor="let item of group.children" 
          class="nav-item" 
          [routerLink]="item.path" 
          routerLinkActive="active"
          title="{{ item.label }}">
          
          <div class="item-content">
            <span class="nav-icon" [style.color]="item.iconColor">{{ item.icon }}</span>
            <span class="nav-label">{{ item.label }}</span>
          </div>

          <span class="nav-badge" *ngIf="item.badge">
            {{ item.badge }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer: Professional User Card Integrated -->
  <div class="sidebar-footer">
    <div class="user-box luxe-card">
      <div class="avatar">أ</div>
      <div class="user-info">
        <div class="name">أحمد الرشيد</div>
        <div class="logout-link" (click)="logout()">تسجيل الخروج ←</div>
      </div>
    </div>
  </div>
</aside>
