<div class="erp-page animate-fade-in pos-settings-page">
  <div class="page-header-luxe">
    <div class="ph-content">
      <div class="ph-badge">تهيئة نقاط البيع (Hardware & Config)</div>
      <h1>⚙️ إعدادات واجهة الكاشير والطابعات</h1>
      <p>تخصيص شكل الفاتورة، ربط الطابعات الحرارية، تحديد نسب الضرائب، وإدارة صلاحيات الكاشير</p>
    </div>
    <div class="ph-actions">
       <button class="btn-luxe btn-primary">حفظ الإعدادات 💾</button>
       <button class="btn-luxe btn-ghost">طباعة فاتورة تجريبية 🖨️</button>
    </div>
  </div>

  <div class="settings-grid mt-1-5">
     <!-- Receipt Config -->
     <div class="luxe-card s-node">
        <div class="node-header"><h3>📄 رأس وتذييل الفاتورة</h3></div>
        <div class="form-group">
           <label>نص الترويسة (Header)</label>
           <input type="text" [(ngModel)]="settings.receiptHeader" placeholder="مثلاً: شركة لوكس للمقاولات">
        </div>
        <div class="form-group">
           <label>نص التذييل (Footer)</label>
           <textarea [(ngModel)]="settings.receiptFooter" rows="3"></textarea>
        </div>
        <div class="form-group">
           <label>الرقم الضريبي (VAT ID)</label>
           <input type="text" [(ngModel)]="settings.taxId">
        </div>
     </div>

     <!-- Device Config -->
     <div class="luxe-card s-node">
        <div class="node-header"><h3>🔌 أجهزة البيع والطابعات</h3></div>
        <div class="form-group">
           <label>نوع الطابعة المتصلة</label>
           <select [(ngModel)]="settings.printerType">
              <option value="thermal">طابعة حرارية (Thermal 80mm)</option>
              <option value="inkjet">طابعة ليزر (A4/A5)</option>
              <option value="none">بدون طباعة تلقائية</option>
           </select>
        </div>
        <div class="check-group">
           <label class="switch-luxe">
              <input type="checkbox" [(ngModel)]="settings.autoPrint">
              <span class="slider"></span>
              <span>طباعة الفاتورة تلقائياً عند الدفع</span>
           </label>
        </div>
        <div class="check-group mt-1">
           <label class="switch-luxe">
              <input type="checkbox" [(ngModel)]="settings.allowDiscounts">
              <span class="slider"></span>
              <span>السماح للكاشير بعمل خصومات يدوية</span>
           </label>
        </div>
     </div>
  </div>
</div>
