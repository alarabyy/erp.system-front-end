<div class="product-catalog-grid luxe-card">
  <div class="pc-header">
    <h3>كشف المخزون المتاح ({{ products?.length || 0 }} صنف)</h3>
    <div class="pc-search-lite">
       <span>🔍</span>
       <input type="text" placeholder="بحث سريع في الرفوف...">
    </div>
  </div>

  <div class="catalog-items" *ngIf="products && products.length > 0; else noProducts">
    <div *ngFor="let p of products" class="p-card pulse-hover">
      <div class="p-badge" [class]="p.status">{{ p.status === 'instock' ? 'متوفر' : 'منخفض' }}</div>
      <div class="p-img Luxe-gradient">
        <span class="p-icon">📦</span>
      </div>
      <div class="p-info">
        <h4 class="p-name">{{ p.name }}</h4>
        <div class="p-sku">SKU: {{ p.sku }}</div>
        <div class="p-meta">
           <span class="p-qty"><b>{{ p.stock }}</b> قطعة</span>
           <span class="p-price">{{ p.price | currency:'USD':'symbol':'1.0-0' }}</span>
        </div>
      </div>
      <div class="p-actions">
        <button class="btn-item-luxe primary" (click)="onAction('RESTOCK', p)">طلب توريد 🚛</button>
        <button class="btn-item-luxe ghost" (click)="onAction('EDIT', p)">⚙️</button>
      </div>
    </div>
  </div>

  <ng-template #noProducts>
    <div class="no-data-luxe">
      <div class="nd-icon">📭</div>
      <p>لا توجد أصناف في هذا التصنيف حالياً</p>
    </div>
  </ng-template>
</div>
